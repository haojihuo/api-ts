version: '3.8'
services:
  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: training_system
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    image: php:8.2-cli
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./scripts:/scripts
    command: sh -c "php -S 0.0.0.0:8000 -t public"
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
